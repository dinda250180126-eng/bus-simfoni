<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Jadwal Keberangkatan Bus</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 40px; }
        .container { max-width: 900px; margin: 0 auto; background: #1e293b; padding: 35px; border-radius: 16px; border: 1px solid #334155; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 20px; margin-bottom: 25px; }
        h2 { margin: 0; color: #38bdf8; }
        .logout-btn { padding: 8px 16px; background: #ef4444; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; text-align: left; }
        th { background: #0f172a; color: #38bdf8; padding: 16px; font-weight: 600; border-bottom: 2px solid #334155; }
        td { padding: 16px; border-bottom: 1px solid #334155; }
        tr:hover { background: #24334d; transition: 0.2s; }
        .order-btn { display: inline-block; padding: 8px 16px; background: #10b981; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 13px; }
        .order-btn:hover { background: #059669; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Selamat Datang, {{ session['nama'] }}!</h2>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
        <p style="color: #94a3b8; margin-bottom: 20px;">Silahkan tentukan rute terminal tujuan Anda:</p>
        <table>
            <tr>
                <th>Kota Asal</th>
                <th>Kota Tujuan</th>
                <th>Jam Berangkat</th>
                <th>Tarif Tiket</th>
                <th>Aksi</th>
            </tr>
            {% for j in list_jadwal %}
            <tr>
                <td><b>{{ j[1] }}</b></td>
                <td><b>{{ j[2] }}</b></td>
                <td>{{ j[3] }}</td>
                <td style="color: #38bdf8; font-weight: bold;">Rp {{ j[4] }}</td>
                <td><a href="/pilih_bangku/{{ j[0] }}" class="order-btn">Pilih Kursi & Pesan</a></td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
